<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Seating Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --deep-black: #050505;
    --gold: #C9A84C;
    --gold-light: #F0D080;
    --gold-dim: #8a6f2e;
    --red: #8B0000;
    --red-bright: #C0132B;
    --cream: #f5e6c8;
    --text-muted: #9a8060;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cormorant Garamond', serif;
    background: var(--deep-black);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* Rose corner decorations */
  .rose-corner {
    position: fixed;
    width: 280px;
    height: 280px;
    pointer-events: none;
    z-index: 1;
  }
  .rose-corner svg { width: 100%; height: 100%; }
  .rose-tl { top: -20px; left: -20px; }
  .rose-br { bottom: -20px; right: -20px; transform: rotate(180deg); }

  .wrapper {
    position: relative;
    z-index: 2;
    max-width: 1100px;
    margin: 0 auto;
    padding: 60px 40px 80px;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    margin-bottom: 48px;
    position: relative;
  }

  .top-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 18px;
    opacity: 0;
    animation: fadeDown 0.8s ease forwards 0.1s;
  }
  .ornament-line {
    flex: 1;
    max-width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }
  .ornament-line.right { background: linear-gradient(90deg, var(--gold), transparent); }
  .ornament-diamond {
    width: 8px; height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
  }
  .ornament-heart {
    color: var(--red-bright);
    font-size: 14px;
    line-height: 1;
  }

  .subtitle {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.35em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 10px;
    opacity: 0;
    animation: fadeDown 0.8s ease forwards 0.2s;
  }

  h1 {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(64px, 10vw, 96px);
    color: var(--gold);
    line-height: 1;
    margin-bottom: 16px;
    text-shadow: 0 0 40px rgba(201,168,76,0.3), 0 2px 4px rgba(0,0,0,0.8);
    opacity: 0;
    animation: fadeDown 0.9s ease forwards 0.3s;
  }

  .bottom-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-top: 8px;
    opacity: 0;
    animation: fadeDown 0.8s ease forwards 0.4s;
  }
  .scroll-line {
    height: 1px;
    width: 80px;
    background: linear-gradient(90deg, transparent, var(--gold-dim));
  }
  .scroll-line.right { background: linear-gradient(90deg, var(--gold-dim), transparent); }

  /* ── SEARCH ── */
  .search-wrap {
    max-width: 560px;
    margin: 0 auto 52px;
    position: relative;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.55s;
  }
  .search-icon {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold-dim);
    font-size: 18px;
    pointer-events: none;
  }
  #search {
    width: 100%;
    padding: 16px 20px 16px 52px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-style: italic;
    color: var(--cream);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--gold-dim);
    border-radius: 2px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    letter-spacing: 0.03em;
  }
  #search::placeholder { color: rgba(245,230,200,0.35); }
  #search:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 1px var(--gold-dim), 0 0 24px rgba(201,168,76,0.12);
  }

  /* ── GRID ── */
  #tables {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 20px;
  }

  /* ── TABLE CARD ── */
  .table-card {
    background: rgba(10,10,10,0.85);
    border: 1px solid var(--gold-dim);
    border-radius: 2px;
    padding: 0;
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .table-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(201,168,76,0.15), 0 0 0 1px var(--gold);
  }
  .table-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* top ornament strip */
  .card-ornament {
    text-align: center;
    padding: 10px 0 6px;
    font-size: 11px;
    color: var(--gold-dim);
    letter-spacing: 0.2em;
    border-bottom: 1px solid rgba(201,168,76,0.2);
  }

  .card-header {
    text-align: center;
    padding: 14px 16px 8px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
  }
  .card-header h3 {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .card-heart {
    color: var(--red-bright);
    font-size: 12px;
  }

  .card-body {
    padding: 14px 16px 18px;
  }
  .card-body ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .card-body li {
    font-size: 14px;
    font-weight: 300;
    color: var(--cream);
    letter-spacing: 0.02em;
    display: flex;
    align-items: baseline;
    gap: 8px;
    line-height: 1.3;
  }
  .card-body li::before {
    content: '◆';
    font-size: 5px;
    color: var(--gold-dim);
    flex-shrink: 0;
    position: relative;
    top: -1px;
  }
  .card-body li.has-speech {
    color: var(--gold-light);
  }
  .card-body li.highlight {
    color: var(--gold-light);
    font-style: italic;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    margin-top: 64px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.2s;
  }
  .footer-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .footer-line {
    height: 1px;
    width: 120px;
    background: linear-gradient(90deg, transparent, var(--gold-dim));
  }
  .footer-line.right { background: linear-gradient(90deg, var(--gold-dim), transparent); }
  footer p {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--gold-dim);
    text-transform: uppercase;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* empty state */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 20px;
    color: var(--text-muted);
  }

  @media (max-width: 600px) {
    .wrapper { padding: 40px 20px 60px; }
    #tables { grid-template-columns: 1fr 1fr; gap: 14px; }
    h1 { font-size: 58px; }
    .rose-corner { width: 180px; height: 180px; }
  }
</style>
</head>

<script>
const data = {
  "Table 1": ["Sandra","Richard (Speech)","Marvia","Aretha","Gregory","Jemani","Will","Jace", "Natalia", "Maryan"],
  "Table 2": ["Micho","Beanca","Shirley","Balo","Cynthia (Speech)","Amaya","Ariana","Katia"],
  "Table 3": ["Patricia (Speech)","Dennis","Jakobi","Alexis","Jashard","Stephanie","Natalie F", "Jaiden"],
  "Table 4": ["Surge (Speech)","Nadine","Carolynn","Caelynn","Cassie","Villon Pierre Louis","John Eyma","Joe"],
  "Table 5": ["Jillian","Aunty Jean","Bunny","Kenroy","Julia","Mike","Marvin Norett","Luigi"],
  "Table 6": ["Suzette","Donfred","Tyler","Danisha","Celanie Cherie","Guylene","Jaden","Lauren"],
  "Table 7": ["Johnathan","Chinaidrine","Christopher","Justina","Stanley","Anne Marie Jacques","Exantus","Elsinor Chevelon"],
  "Table 8": ["Lacey","Loren","Leon","Logan","Sammy","Dashline","Paul","Marvens"],
  "Table 9": ["Marcos","Christelle","Maelle","Malia","Evans","Daniela","Jordan","Laura"],
  "Table 10": ["Emmanuel","Sandra L","Jene Fene","Maudeline Fene","Valere Fanfan","Jumet Fene","Wesline Fene","Jude Fene (+ Wife)"]
};

const container = document.getElementById("tables");

function renderTables(filter = "") {
  container.innerHTML = "";
  const lower = filter.toLowerCase();
  let count = 0;

  for (const [table, guests] of Object.entries(data)) {
    const matched = filter
      ? guests.filter(n => n.toLowerCase().includes(lower))
      : guests;

    if (filter && matched.length === 0) continue;
    count++;

    const card = document.createElement("div");
    card.className = "table-card";
    card.style.animationDelay = `${0.6 + count * 0.07}s`;

    const showGuests = filter ? matched : guests;

    card.innerHTML = `
      <div class="card-ornament">✦ &nbsp; ✦ &nbsp; ✦</div>
      <div class="card-header">
        <h3>${table}</h3>
        <div class="card-heart">♥</div>
      </div>
      <div class="card-body">
        <ul>
          ${showGuests.map(g => {
            const isSpeech = g.includes("(Speech)");
            return `<li class="${isSpeech ? 'has-speech' : ''}">${g}</li>`;
          }).join("")}
        </ul>
      </div>
    `;

    container.appendChild(card);
  }

  if (count === 0) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "No guests found. Please check the spelling of your name.";
    container.appendChild(empty);
  }
}

document.getElementById("search").addEventListener("input", e => {
  renderTables(e.target.value);
});

renderTables();
</script>
